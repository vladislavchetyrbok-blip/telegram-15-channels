name: Publish due Telegram posts

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

concurrency:
  group: publish-due-telegram-posts
  cancel-in-progress: false

jobs:
  publish-due:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: production
      PUBLISH_DUE_STORE: json
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_DRY_RUN: ${{ secrets.TELEGRAM_DRY_RUN }}
      TELEGRAM_REAL_PUBLISH_ENABLED: ${{ secrets.TELEGRAM_REAL_PUBLISH_ENABLED }}
      AUTOPUBLISH_ENABLED: ${{ secrets.AUTOPUBLISH_ENABLED }}
      AUTOPUBLISH_DAILY_LIMIT_PER_CHANNEL: ${{ secrets.AUTOPUBLISH_DAILY_LIMIT_PER_CHANNEL }}
      AUTOPUBLISH_MAX_POSTS_PER_DAY: ${{ secrets.AUTOPUBLISH_MAX_POSTS_PER_DAY }}
      AUTOPUBLISH_TIME_START: ${{ secrets.AUTOPUBLISH_TIME_START }}
      AUTOPUBLISH_TIME_END: ${{ secrets.AUTOPUBLISH_TIME_END }}
      AUTOPUBLISH_DAYS: ${{ secrets.AUTOPUBLISH_DAYS }}
      AUTOPUBLISH_TIME: ${{ secrets.AUTOPUBLISH_TIME }}
      AUTOPUBLISH_TIMEZONE: ${{ secrets.AUTOPUBLISH_TIMEZONE }}
      AUTOPUBLISH_WORKER_INTERVAL_MS: ${{ secrets.AUTOPUBLISH_WORKER_INTERVAL_MS }}
    timeout-minutes: 20

  

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Restore scheduler runtime cache
        uses: actions/cache/restore@v4
        with:
          path: |
            data/runtime/publication_logs.json
            data/runtime/publish-scheduler.json
          key: publish-scheduler-runtime-${{ github.run_id }}
          restore-keys: |
            publish-scheduler-runtime-

      - name: Publish due Telegram posts
        run: npm run publish:due

      - name: Save scheduler runtime cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            data/runtime/publication_logs.json
            data/runtime/publish-scheduler.json
          key: publish-scheduler-runtime-${{ github.run_id }}
